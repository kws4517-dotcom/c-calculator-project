name: C Calculator CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 빌드 도구 설치
        run: sudo apt-get update && sudo apt-get install -y build-essential make

      - name: 프로젝트 빌드
        run: make

      - name: 테스트 실행
        run: make test

