name: C Calculator CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/c-calculator-project
  DEPLOY_PATH: C:\deploy\c-calculator-project

jobs:
  build-test-publish:
    name: Build, Test, Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make

      - name: Build project
        run: make

      - name: Run tests
        run: make test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on Windows self-hosted runner
    needs: build-test-publish
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Show runner info
        shell: pwsh
        run: |
          Write-Host "Runner is working"
          hostname
          whoami
          $PSVersionTable.PSVersion

      - name: Check Docker
        shell: pwsh
        run: |
          docker --version
          docker compose version
          docker ps

      - name: Log in to GHCR on deployment server
        shell: pwsh
        run: |
          $pat = "${{ secrets.GHCR_PAT }}"
          $user = "${{ secrets.GHCR_USER }}"

          if ([string]::IsNullOrWhiteSpace($pat)) {
            throw "GHCR_PAT secret is empty or missing."
          }

          if ([string]::IsNullOrWhiteSpace($user)) {
            throw "GHCR_USER secret is empty or missing."
          }

          $pat | docker login ghcr.io -u $user --password-stdin

      - name: Prepare deployment directory
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          New-Item -ItemType Directory -Force -Path $deployPath | Out-Null
          Write-Host "Deployment path: $deployPath"

      - name: Create docker-compose.yml
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          $composeFile = Join-Path $deployPath "docker-compose.yml"

          @"
          services:
            c-calculator:
              image: ${{ env.IMAGE_NAME }}:latest
              container_name: c-calculator-prod
              stdin_open: true
              tty: true
              restart: unless-stopped
          "@ | Set-Content -Path $composeFile -Encoding UTF8

          Write-Host "docker-compose.yml created:"
          Get-Content $composeFile

      - name: Pull latest image
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          docker compose pull

      - name: Deploy container
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          docker compose up -d

      - name: Verify deployment
        shell: pwsh
        run: |
          $deployPath = "${{ env.DEPLOY_PATH }}"
          Set-Location $deployPath
          docker compose ps
          docker images | Select-String "c-calculator-project"
          docker logs c-calculator-prod --tail 50



